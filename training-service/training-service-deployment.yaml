apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service-deployment
  namespace: pi-soyosa
  labels:
    app: training-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-service
  template:
    metadata:
      labels:
        app: training-service
    spec:
      containers:
      - name: training-service
        image: oussema22/pi-training-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/trainingDB?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
        - name: USER_SERVICE_URL
          value: "http://user-microservice:8070/api"
