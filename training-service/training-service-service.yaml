apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: '8082'
    prometheus.io/scrape: 'true'
  name: training-service
  namespace: pi-soyosa
spec:
  ports:
  - port: 8082
    protocol: TCP
    targetPort: 8082
  selector:
    app: training-service
  type: ClusterIP
