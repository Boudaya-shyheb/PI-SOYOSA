apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: '8070'
    prometheus.io/scrape: 'true'
  name: user-microservice
  namespace: pi-soyosa
spec:
  ports:
  - port: 8070
    protocol: TCP
    targetPort: 8070
  selector:
    app: user-microservice
  type: ClusterIP
