apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameservice-deployment
  namespace: pi-soyosa
  labels:
    app: gameservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gameservice
  template:
    metadata:
      labels:
        app: gameservice
    spec:
      containers:
      - name: gameservice
        image: oussema22/pi-gameservice:latest
        ports:
        - containerPort: 8084
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/GameService?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
