apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: '8084'
    prometheus.io/scrape: 'true'
  name: game-service
  namespace: pi-soyosa
spec:
  ports:
  - port: 8084
    protocol: TCP
    targetPort: 8084
  selector:
    app: gameservice
  type: ClusterIP
