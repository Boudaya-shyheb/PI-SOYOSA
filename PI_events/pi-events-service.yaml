apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: '8086'
    prometheus.io/scrape: 'true'
  name: pi-events
  namespace: pi-soyosa
spec:
  ports:
  - port: 8086
    protocol: TCP
    targetPort: 8086
  selector:
    app: pi-events
  type: ClusterIP
