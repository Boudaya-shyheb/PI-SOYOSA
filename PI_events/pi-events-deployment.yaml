apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-events-deployment
  namespace: pi-soyosa
  labels:
    app: pi-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-events
  template:
    metadata:
      labels:
        app: pi-events
    spec:
      containers:
      - name: pi-events
        image: oussema22/pi-events:latest
        ports:
        - containerPort: 8086
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/pi_events_db?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
