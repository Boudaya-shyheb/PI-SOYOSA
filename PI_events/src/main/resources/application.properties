# ===============================
# Application
# ===============================
spring.application.name=pi-events
server.port=8086

# ===============================
# MySQL - Create DB if not exists
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/pi_events_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
app.jwt.secret=VnY2aC9pS0R3eVJwRXBvS2xJbW83Y2N3b0V1Q0VrU1BNa1Z4N0xwN3FQTT0=
app.jwt.expiration=86400000
app.admin.email=admin@pi-event.tn
app.admin.password=admin1234

eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
spring.cloud.discovery.enabled=${EUREKA_ENABLED:true}
