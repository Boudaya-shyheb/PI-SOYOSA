# Test application properties - overrides main application.yml during tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Disable Eureka during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Stripe test keys (non-functional placeholders)
app.stripe.api.public-key=pk_test_placeholder
app.stripe.api.private-key=sk_test_placeholder
app.stripe.webhook.secret=whsec_placeholder

# Disable Kafka during tests
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Suppress extra startup logs
logging.level.root=WARN
logging.level.com.englishway=INFO
