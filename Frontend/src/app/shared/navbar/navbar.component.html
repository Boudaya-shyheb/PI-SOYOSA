<nav class="border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <div class="flex items-center space-x-8">
        <a routerLink="/" class="flex items-center">
          <div class="bg-primary text-secondary p-1 rounded font-bold text-lg px-3">
            Jungle in English
          </div>
        </a>

        <div class="hidden md:flex space-x-6">
          <a routerLink="/" routerLinkActive="text-primary font-bold" [routerLinkActiveOptions]="{ exact: true }" class="text-gray-600 hover:text-primary transition">About</a>
          <a routerLink="/courses" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Courses</a>
          <a routerLink="/trainings" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Training</a>
          <a routerLink="/clubs" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Clubs</a>
          <a routerLink="/events" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Events</a>
          <a routerLink="/categories" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Categories</a>
          <a routerLink="/games" routerLinkActive="text-primary font-bold" class="flex items-center text-gray-600 hover:text-primary transition">Games</a>
          <a routerLink="/blog" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Blog</a>
          <a routerLink="/chat" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Chat</a>
          <a routerLink="/shop" routerLinkActive="text-primary font-bold" class="text-gray-600 hover:text-primary transition">Shop</a>
          </div>
      </div>

      <div class="flex items-center space-x-4">
        <div class="hidden sm:flex items-center space-x-2">
          <span class="text-xs text-gray-400">Role:</span>
          <span class="text-xs border border-gray-200 rounded-lg px-2 py-1 text-gray-600">{{ roleLabel }}</span>
        </div>
        <button
          *ngIf="!hasSession"
          class="text-xs font-bold px-3 py-2 rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50 transition"
          (click)="goTo()">
          Login
        </button>
        <button
          *ngIf="hasSession"
          class="text-xs font-bold px-3 py-2 rounded-lg border border-red-200 text-red-700 hover:bg-red-50 transition"
          (click)="logout()">
          Logout
        </button>
        <!-- Icons replaced with emoji to avoid extra library; consider lucide-angular -->
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center cursor-pointer" (click)="profilePage()">🧑‍🎓</div>
        <app-notification-dropdown *ngIf="auth.getRole() === 'STUDENT'"></app-notification-dropdown>
        <div *ngIf="auth.getRole() !== 'STUDENT'" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center cursor-pointer" routerLink="/chat">&#9993;</div>
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center cursor-pointer" (click)="adminDashboard()">👨🏻‍💻</div>
      </div>
    </div>
  </div>
</nav>
