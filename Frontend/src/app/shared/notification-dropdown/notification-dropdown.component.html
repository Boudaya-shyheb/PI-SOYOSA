<div class="notification-wrapper">
  <button class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center cursor-pointer relative" 
    (click)="toggleDropdown()" 
    [attr.aria-label]="'Notifications ' + unreadCount"
    [class.shake-animation]="isJiggling"
    [class.pulse-animation]="unreadCount > 0">
    🔔
    <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
  </button>

  <div class="dropdown-panel" *ngIf="isOpen" (click)="$event.stopPropagation()">
    <div class="header">
      <div class="header-title">
        <h3>Notifications</h3>
        <span class="count" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
      </div>
      <button *ngIf="unreadCount > 0" class="read-all-link" (click)="markAllAsRead()">
        Mark all as read
      </button>
    </div>

    <div class="notification-list">
      <div *ngIf="notifications.length === 0" class="empty-state">
        <i class="fas fa-bell-slash"></i>
        <p>No notifications yet</p>
      </div>

      <div *ngFor="let n of notifications" 
           class="notification-item" 
           [class.unread]="!n.isRead"
           (click)="onNotificationClick(n)">
        <div class="status-indicator" [class.pulse]="!n.isRead"></div>
        <div class="type-badge" *ngIf="n.type === 'CERTIFICATE'">🎖️</div>
        <div class="notification-content">
          <p class="message">{{ n.message }}</p>
          <div class="meta">
            <span class="date">{{ formatDate(n.createdAt) }}</span>
            <button *ngIf="!n.isRead" class="item-mark-read" (click)="markAsRead(n.id, $event)">
              Mark as read
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
