<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<div class="container">
    <div class="form-box">
        <form #forgotPasswordForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
            <h1>Forgot Password</h1>
            <p>Enter your email address to receive a password reset link.</p>
            
            <div class="input-box">
                <input type="email" name="email" placeholder="Email"
                       [(ngModel)]="email"
                       #emailModel="ngModel"
                       required email />
                <i class='bx bxs-envelope'></i>
                <div *ngIf="emailModel.invalid && emailModel.touched" class="error">Valid email is required.</div>
            </div>

            <button type="submit" class="btn" [disabled]="forgotPasswordForm.invalid">Send Reset Link</button>
            
            <div class="back-link">
                <a (click)="backToLogin()">Back to Login</a>
            </div>
        </form>
    </div>

    <div class="toggle-box">
        <div class="toggle-panel">
            <h1>Reset your password</h1>
            <p>We'll help you get back to your account.</p>
        </div>
    </div>
</div>
</body>
</html>
