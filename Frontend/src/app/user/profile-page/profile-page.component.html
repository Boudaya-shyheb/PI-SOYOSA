<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto space-y-8">
    
    <!-- Profile Header -->
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100 flex items-center space-x-6">
      <div class="relative group">
        <div *ngIf="previewUrl; else initials" class="h-24 w-24 rounded-full overflow-hidden border-4 border-primary shadow-lg">
          <img [src]="previewUrl" alt="Profile" class="h-full w-full object-cover">
        </div>
        <ng-template #initials>
          <div class="h-24 w-24 bg-primary rounded-full flex items-center justify-center text-white text-3xl font-bold border-4 border-primary shadow-lg">
            {{ userProfile.firstName?.charAt(0) }}{{ userProfile.lastName?.charAt(0) }}
          </div>
        </ng-template>
        
        <!-- Upload Overlay -->
        <label class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-0 group-hover:bg-opacity-40 rounded-full cursor-pointer transition-all duration-300">
          <span class="text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </span>
          <input type="file" class="hidden" (change)="onFileSelected($event)" accept="image/*">
        </label>
      </div>
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900">{{ userProfile.firstName }} {{ userProfile.lastName }}</h1>
        <p class="text-gray-500">{{ userProfile.mail }}</p>
      </div>
    </div>

    <div *ngIf="isLoading" class="flex justify-center py-10">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
    </div>

    <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <!-- Edit Information -->
      <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
          <span class="mr-2">👤</span> Update Personal Info
        </h2>
        <form (ngSubmit)="updateInfo()" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
              <input type="text" [(ngModel)]="userProfile.firstName" name="firstName" 
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
              <input type="text" [(ngModel)]="userProfile.lastName" name="lastName" 
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
            <input type="text" [(ngModel)]="userProfile.phoneNumber" name="phoneNumber" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
            <textarea [(ngModel)]="userProfile.address" name="address" rows="3"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm"></textarea>
          </div>
          <button type="submit" 
                  [disabled]="!isProfileChanged() || !isProfileValid()"
                  class="w-full bg-primary text-white font-bold py-2 px-4 rounded-lg hover:bg-opacity-90 transition transform active:scale-95 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
            Save Changes
          </button>
        </form>
      </div>

      <!-- Change Password -->
      <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
          <span class="mr-2">🔒</span> Change Password
        </h2>
        <form (ngSubmit)="changePassword()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
            <input type="password" [(ngModel)]="passwordData.currentPassword" name="currentPassword" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
            <input type="password" [(ngModel)]="passwordData.newPassword" name="newPassword" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
            <input type="password" [(ngModel)]="passwordData.confirmPassword" name="confirmPassword" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition shadow-sm">
          </div>
          <button type="submit" 
                  class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition transform active:scale-95 shadow-lg">
            Update Password
          </button>
        </form>
      </div>

    </div>

    <!-- Danger Zone -->
    <div *ngIf="!isLoading" class="bg-red-50 p-8 rounded-xl shadow-md border border-red-100">
      <h2 class="text-xl font-bold text-red-800 mb-2">Danger Zone</h2>
      <p class="text-red-600 mb-6">Once you delete your account, there is no going back. Please be certain.</p>
      <button (click)="deleteAccount()" 
              class="bg-red-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-red-700 transition transform active:scale-95 shadow-lg">
        Delete My Account
      </button>
    </div>

  </div>
</div>
