<div class="max-w-6xl mx-auto p-8">

  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-primary">Club Members</h2>

    <button *ngIf="auth.isAdmin()"
      (click)="create()"
      class="bg-primary text-white px-4 py-2 rounded hover:bg-primary/80 transition">
      Add Member
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-gray-500">
    Loading members...
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="text-red-500">
    {{ errorMessage }}
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && members.length === 0" class="text-gray-400">
    No members found.
  </div>

  <!-- Members List -->
  <div *ngIf="members.length > 0" class="space-y-4">

    <div *ngFor="let member of members"
         class="bg-white shadow rounded-xl p-6 flex justify-between items-center">

      <div>
        <h3 class="font-bold text-lg">
          {{ member.firstName }} {{ member.lastName }}
        </h3>

        <p class="text-gray-600">
          {{ member.email }}
        </p>

        <p class="text-sm text-gray-500">
          Role: {{ member.role }}
        </p>

        <p class="text-sm text-gray-400">
          Age: {{ member.age }} | Education: {{ member.educationLevel }}
        </p>
      </div>

      <div class="space-x-2" *ngIf="auth.isAdmin()">
        <button
          (click)="edit(member.id)"
          class="px-3 py-1 bg-yellow-400 rounded hover:bg-yellow-500">
          Edit
        </button>

        <button
          (click)="delete(member.id)"
          class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">
          Delete
        </button>
      </div>

    </div>

  </div>

</div>
