<div class="w-full bg-white rounded-lg shadow-sm p-6 mb-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-4 cursor-pointer" (click)="toggleExpanded()">
    <h3 class="text-lg font-bold text-primary">🔍 Advanced Search</h3>
    <span class="text-xl">{{ isExpanded ? '▼' : '▶' }}</span>
  </div>

  <!-- Search Filters (Expandable) -->
  <div *ngIf="isExpanded" class="space-y-4 mb-6 pb-6 border-b">
    <!-- Keyword Search -->
    <div>
      <label class="block text-sm font-semibold text-primary mb-2">Keyword</label>
      <input
        type="text"
        [(ngModel)]="searchRequest.keyword"
        placeholder="Search by name or description..."
        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
      />
    </div>

    <!-- Price Range -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Min Price</label>
        <input
          type="number"
          [(ngModel)]="searchRequest.minPrice"
          placeholder="0"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Max Price</label>
        <input
          type="number"
          [(ngModel)]="searchRequest.maxPrice"
          placeholder="1000"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        />
      </div>
    </div>

    <!-- Rating Range -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Min Rating</label>
        <input
          type="number"
          [(ngModel)]="searchRequest.minRating"
          min="0"
          max="5"
          step="0.5"
          placeholder="0"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Max Rating</label>
        <input
          type="number"
          [(ngModel)]="searchRequest.maxRating"
          min="0"
          max="5"
          step="0.5"
          placeholder="5"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        />
      </div>
    </div>

    <!-- Sort Options -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Sort By</label>
        <select
          [(ngModel)]="searchRequest.sortBy"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        >
          <option *ngFor="let opt of sortOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-primary mb-2">Direction</label>
        <select
          [(ngModel)]="searchRequest.sortDirection"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-primary outline-none text-sm"
        >
          <option *ngFor="let opt of directionOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-3">
    <button
      (click)="performSearch()"
      [disabled]="isLoading"
      class="flex-1 bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-opacity-90 transition disabled:opacity-50"
    >
      {{ isLoading ? '🔄 Searching...' : '🔍 Search' }}
    </button>
    <button
      (click)="resetFilters()"
      class="px-6 py-2 rounded-lg border border-gray-300 text-primary font-semibold hover:bg-gray-50 transition"
    >
      Reset
    </button>
  </div>

  <!-- Results Summary -->
  <div *ngIf="searchResults.length > 0" class="mt-6 pt-6 border-t">
    <p class="text-sm text-gray-600 mb-4">Found <strong>{{ totalResults }}</strong> product(s)</p>

    <!-- Results Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div
        *ngFor="let product of searchResults"
        class="bg-gray-50 rounded-lg p-4 hover:shadow-md transition"
      >
        <img
          [src]="product.imageUrl || 'https://picsum.photos/seed/product/200/200'"
          alt="{{ product.name }}"
          class="w-full h-40 object-cover rounded-lg mb-3"
        />
        <h4 class="font-semibold text-sm text-primary mb-2 line-clamp-2">{{ product.name }}</h4>
        <div class="flex items-center justify-between">
          <span class="font-bold text-primary">{{ product.price }} TND</span>
          <span *ngIf="product.averageRating" class="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded">
            ⭐ {{ product.averageRating }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- No Results -->
  <div *ngIf="!isLoading && searchResults.length === 0 && totalResults === 0" class="text-center py-8">
    <p class="text-gray-500">No products found matching your search. Try adjusting your filters.</p>
  </div>
</div>
