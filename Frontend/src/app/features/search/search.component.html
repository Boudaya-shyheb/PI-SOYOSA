<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="mb-12">
    <h1 class="text-3xl font-bold text-primary mb-8">Search, learn & evolve</h1>
    <div class="relative max-w-xl">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
      <input type="text" placeholder="What's on your mind"
             class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-2xl focus:border-primary outline-none transition shadow-sm"
             [formControl]="form.controls.searchTerm" />
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
    <div class="lg:col-span-1 space-y-8">
      <div>
        <h3 class="text-lg font-bold text-primary mb-4 border-b border-gray-100 pb-2">Type</h3>
        <div class="space-y-3">
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="radio" name="type" class="w-4 h-4 text-primary focus:ring-primary border-gray-300" checked>
            <span class="text-gray-600 group-hover:text-primary transition">All</span>
          </label>
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="radio" name="type" class="w-4 h-4 text-primary focus:ring-primary border-gray-300">
            <span class="text-gray-600 group-hover:text-primary transition">Blended</span>
          </label>
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="radio" name="type" class="w-4 h-4 text-primary focus:ring-primary border-gray-300">
            <span class="text-gray-600 group-hover:text-primary transition">Live</span>
          </label>
        </div>
      </div>

      <div>
        <h3 class="text-lg font-bold text-primary mb-4 border-b border-gray-100 pb-2">Level</h3>
        <div class="space-y-3">
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="checkbox" class="w-4 h-4 rounded text-primary focus:ring-primary border-gray-300" checked>
            <span class="text-gray-600 group-hover:text-primary transition">Beginner</span>
          </label>
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="checkbox" class="w-4 h-4 rounded text-primary focus:ring-primary border-gray-300">
            <span class="text-gray-600 group-hover:text-primary transition">Mid-level</span>
          </label>
          <label class="flex items-center space-x-3 cursor-pointer group">
            <input type="checkbox" class="w-4 h-4 rounded text-primary focus:ring-primary border-gray-300">
            <span class="text-gray-600 group-hover:text-primary transition">Advanced</span>
          </label>
        </div>
      </div>

      <div>
        <h3 class="text-lg font-bold text-primary mb-4 border-b border-gray-100 pb-2">Price</h3>
        <input type="range" class="w-full accent-primary" />
        <div class="flex justify-between text-xs text-gray-400 mt-2 font-medium">
          <span>0 TND</span>
          <span>2000 TND</span>
        </div>
      </div>

      <button class="w-full bg-primary/10 text-primary py-3 rounded-xl font-bold hover:bg-primary hover:text-white transition flex items-center justify-center space-x-2">
        <span class="rotate-90">↪</span>
        <span>Apply filters</span>
      </button>
    </div>

    <div class="lg:col-span-3 space-y-6">
      <ng-container *ngIf="courses$ | async as courses">
        <div *ngFor="let course of courses" class="bg-white rounded-3xl p-6 border border-gray-100 flex flex-col md:flex-row gap-8 hover:shadow-lg transition group">
          <div class="md:w-1/3 aspect-[4/3] rounded-2xl overflow-hidden shadow-inner">
            <img [src]="course.image" [alt]="course.title" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
          </div>
          <div class="md:w-2/3 flex flex-col justify-between">
            <div>
              <div class="inline-block bg-primary/10 text-primary text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3">
                {{ course.type }} learning
              </div>
              <h3 class="text-2xl font-bold text-primary mb-4 leading-tight group-hover:text-opacity-80 transition cursor-pointer">
                {{ course.title }}
              </h3>
              <p class="text-gray-500 text-sm line-clamp-2 mb-6 leading-relaxed">
                {{ course.description }}
              </p>
            </div>
            
            <div class="flex items-center justify-between mt-auto pt-6 border-t border-gray-50">
              <div class="flex items-baseline space-x-3">
                <span class="text-2xl font-black text-primary">{{ course.price }} <small class="text-xs">TND</small></span>
                <span *ngIf="course.oldPrice" class="text-sm text-gray-400 line-through font-medium">{{ course.oldPrice }} TND</span>
              </div>
              <div class="flex space-x-3">
                <button class="bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-opacity-90 transition text-sm flex items-center space-x-2">
                  <span>{{ course.type === 'Live' ? '📖' : '🛒' }}</span>
                  <span>{{ course.type === 'Live' ? 'Book your place' : 'Purchase' }}</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
      
      <div class="flex justify-center mt-12">
        <div class="flex space-x-2">
          <button class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold transition bg-primary text-white">1</button>
          <button class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold transition text-gray-400 hover:bg-gray-100">2</button>
          <button class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold transition text-gray-400 hover:bg-gray-100">3</button>
        </div>
      </div>
    </div>
  </div>
</div>
