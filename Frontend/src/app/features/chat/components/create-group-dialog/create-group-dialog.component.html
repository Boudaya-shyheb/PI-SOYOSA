<div class="create-group-dialog">
    <div class="dialog-content">
        <div class="dialog-header">
            <h2>Create Group Chat</h2>
            <button class="btn-close" (click)="cancel()">✕</button>
        </div>

        <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="createGroup()" class="form">
            <div class="form-group">
                <label for="groupName">Group Name</label>
                <input id="groupName" type="text" [(ngModel)]="groupName" name="groupName"
                    placeholder="Enter group name" [disabled]="creating" required />
            </div>

            <div class="form-group">
                <label>Select Members</label>
                <div *ngIf="loading" class="loading">Loading users...</div>
                <div *ngIf="!loading" class="members-list">
                    <div *ngFor="let user of allUsers" class="member-item"
                        [class.selected]="isUserSelected(user.userId)" (click)="toggleUserSelection(user.userId)">
                        <input type="checkbox" [checked]="isUserSelected(user.userId)"
                            (change)="toggleUserSelection(user.userId)" />
                        <span class="member-name">{{ user.username }}</span>
                    </div>
                </div>
                <div class="members-count">
                    {{ selectedMemberIds.length }} member<span *ngIf="selectedMemberIds.length !== 1">s</span>
                    selected
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="creating">
                    Cancel
                </button>
                <button type="submit" class="btn-submit"
                    [disabled]="!groupName.trim() || selectedMemberIds.length === 0 || creating">
                    {{ creating ? 'Creating...' : 'Create Group' }}
                </button>
            </div>
        </form>
    </div>
</div>
