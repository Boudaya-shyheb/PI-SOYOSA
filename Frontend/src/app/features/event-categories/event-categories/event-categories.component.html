<div class="max-w-5xl mx-auto py-12">

  <div class="flex justify-between mb-6">
    <h2 class="text-3xl font-bold">Categories</h2>

    <a *ngIf="auth.isAdmin()" routerLink="/categories/create"
       class="bg-primary text-white px-4 py-2 rounded-lg">
      Add Category
    </a>
  </div>

  <div class="bg-white shadow rounded-xl p-6">

    <div *ngFor="let category of categories"
         class="flex justify-between items-center border-b py-4">

      <div>
        <h3 class="font-semibold">{{ category.name }}</h3>
        <p class="text-gray-500 text-sm">
          {{ category.description }}
        </p>
      </div>

      <div class="flex gap-4" *ngIf="auth.isAdmin()">

        <a [routerLink]="['/categories/edit', category.id]"
           class="text-blue-500">
          Edit
        </a>

        <button (click)="deleteCategory(category.id!)"
                class="text-red-500">
          Delete
        </button>

      </div>

    </div>

  </div>

</div>
