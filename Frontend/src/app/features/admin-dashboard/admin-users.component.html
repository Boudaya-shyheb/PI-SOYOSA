<div class="space-y-8">
  <!-- TUTORS -->
  <div class="bg-white rounded-3xl shadow-lg p-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
      <h2 class="text-2xl font-bold text-primary flex items-center">
        <span class="mr-2">🎓</span> Tutors
      </h2>
      <div class="relative max-w-sm">
        <input 
          type="text" 
          [(ngModel)]="tutorSearch" 
          (input)="onTutorSearch()" 
          placeholder="Search tutors..." 
          class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
        >
        <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-gray-100">
            <th class="py-4 font-semibold text-gray-600">Username/Email</th>
            <th class="py-4 font-semibold text-gray-600">Role</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of tutors" class="border-b border-gray-50 hover:bg-gray-50 transition">
            <td class="py-4 font-medium text-gray-800">{{ user.username }}</td>
            <td class="py-4">
              <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold uppercase">
                {{ user.role }}
              </span>
            </td>
          </tr>
          <tr *ngIf="!tutors?.length">
            <td colspan="2" class="py-10 text-center text-gray-400">No tutors found.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- TUTOR PAGINATION -->
    <div class="mt-8 flex items-center justify-between border-t border-gray-100 pt-6">
      <p class="text-sm text-gray-500">
        Page <span class="font-medium text-gray-900">{{ tutorPage + 1 }}</span> of <span class="font-medium text-gray-900">{{ tutorTotalPages }}</span>
      </p>
      <div class="flex space-x-2">
        <button 
          (click)="prevTutorPage()" 
          [disabled]="tutorPage === 0"
          class="px-4 py-2 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Previous
        </button>
        <button 
          (click)="nextTutorPage()" 
          [disabled]="tutorPage >= tutorTotalPages - 1"
          class="px-4 py-2 bg-primary text-white rounded-xl text-sm font-medium hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Next
        </button>
      </div>
    </div>
  </div>

  <!-- STUDENTS -->
  <div class="bg-white rounded-3xl shadow-lg p-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
      <h2 class="text-2xl font-bold text-primary flex items-center">
        <span class="mr-2">📖</span> Students
      </h2>
      <div class="relative max-w-sm">
        <input 
          type="text" 
          [(ngModel)]="studentSearch" 
          (input)="onStudentSearch()" 
          placeholder="Search students..." 
          class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
        >
        <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-gray-100">
            <th class="py-4 font-semibold text-gray-600">Username/Email</th>
            <th class="py-4 font-semibold text-gray-600">Role</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of students" class="border-b border-gray-50 hover:bg-gray-50 transition">
            <td class="py-4 font-medium text-gray-800">{{ user.username }}</td>
            <td class="py-4">
              <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">
                {{ user.role }}
              </span>
            </td>
          </tr>
          <tr *ngIf="!students?.length">
            <td colspan="2" class="py-10 text-center text-gray-400">No students found.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- STUDENT PAGINATION -->
    <div class="mt-8 flex items-center justify-between border-t border-gray-100 pt-6">
      <p class="text-sm text-gray-500">
        Page <span class="font-medium text-gray-900">{{ studentPage + 1 }}</span> of <span class="font-medium text-gray-900">{{ studentTotalPages }}</span>
      </p>
      <div class="flex space-x-2">
        <button 
          (click)="prevStudentPage()" 
          [disabled]="studentPage === 0"
          class="px-4 py-2 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Previous
        </button>
        <button 
          (click)="nextStudentPage()" 
          [disabled]="studentPage >= studentTotalPages - 1"
          class="px-4 py-2 bg-primary text-white rounded-xl text-sm font-medium hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          Next
        </button>
      </div>
    </div>
  </div>
</div>
