<div class="bg-white rounded-3xl shadow-lg p-8">
  <h2 class="text-2xl font-bold text-primary mb-6">Manage Tutor Interviews</h2>
  
  <div class="overflow-x-auto">
    <table class="w-full text-left">
      <thead>
        <tr class="border-b border-gray-100">
          <th class="py-4 font-semibold text-gray-600">User</th>
          <th class="py-4 font-semibold text-gray-600">Date/Time</th>
          <th class="py-4 font-semibold text-gray-600">Admin</th>
          <th class="py-4 font-semibold text-gray-600">Status</th>
          <th class="py-4 font-semibold text-gray-600 text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let interview of interviews" class="border-b border-gray-50 hover:bg-gray-50 transition">
          <td class="py-4 font-medium text-gray-800">{{ interview.user }}</td>
          <td class="py-4 text-gray-600">
              <div class="font-semibold">{{ interview.date | date:'mediumDate' }}</div>
              <div *ngIf="interview.time" class="text-xs text-blue-500 font-bold uppercase">⏰ {{ interview.time | slice:0:5 }}</div>
          </td>
          <td class="py-4 text-gray-600">
              <span *ngIf="interview.administrator" class="text-xs px-2 py-1 bg-gray-100 rounded text-gray-500">{{ interview.administrator }}</span>
              <span *ngIf="!interview.administrator" class="text-xs text-gray-300 italic">Not Assigned</span>
          </td>
          <td class="py-4">
            <span [ngClass]="{
              'bg-yellow-100 text-yellow-700': interview.status === 'PENDING',
              'bg-blue-100 text-blue-700': interview.status === 'SCHEDULED',
              'bg-green-100 text-green-700': interview.status === 'PASSED',
              'bg-red-100 text-red-700': interview.status === 'FAILED'
            }" class="px-3 py-1 rounded-full text-xs font-bold uppercase">
              {{ interview.status }}
            </span>
          </td>
          <td class="py-4 text-right space-x-2">
            <button *ngIf="interview.status === 'PENDING'" (click)="schedule(interview)" class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg transition font-semibold text-sm">Schedule</button>
            <button *ngIf="interview.status === 'SCHEDULED'" (click)="pass(interview)" class="text-green-600 hover:bg-green-50 p-2 rounded-lg transition font-semibold text-sm">Pass</button>
            <button *ngIf="interview.status !== 'FAILED' && interview.status !== 'PASSED'" (click)="fail(interview)" class="text-red-600 hover:bg-red-50 p-2 rounded-lg transition font-semibold text-sm">Fail</button>
          </td>
        </tr>
        <tr *ngIf="!interviews?.length">
            <td colspan="4" class="py-10 text-center text-gray-400">No interview requests found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
