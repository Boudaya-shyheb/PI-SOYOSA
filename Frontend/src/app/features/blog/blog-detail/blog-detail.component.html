<div *ngIf="blog" class="min-h-screen bg-gray-50 pb-20">

    <!-- HERO -->
    <div class="relative h-[60vh] min-h-[400px] w-full">
        <img
                *ngIf="blog.images?.length"
                [src]="blog.images[0]"
                [alt]="blog.title"
                class="w-full h-full object-cover"
        />

        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>

        <div class="absolute bottom-0 left-0 right-0 p-8 md:p-16">
            <div class="max-w-4xl mx-auto">

                <a routerLink="/blog" class="text-sm text-gray-300 hover:text-white">
                    Blog
                </a>

                <h1 class="text-4xl md:text-6xl font-black text-white mt-4">
                    {{ blog.title }}
                </h1>

                <div class="mt-4 text-white">
                    <span class="font-semibold">{{ blog.userId }}</span>
                    •
                    <span class="text-sm">
            {{ blog.createdAt | date:'dd MMM yyyy' }}
          </span>
                </div>

            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="max-w-4xl mx-auto px-4 -mt-10 relative z-10">
        <div class="bg-white rounded-[40px] shadow-xl p-8 md:p-16">

            <!-- ARTICLE -->
            <article
                    class="prose prose-lg max-w-none text-gray-700"
                    [innerHTML]="blog.content">
            </article>

            <!-- LIKE SECTION -->
            <div class="mt-12 pt-8 border-t border-gray-100">
                <button
                        (click)="toggleLike()"
                        class="flex items-center space-x-2 transition"
                        [ngClass]="likedBlog ? 'text-red-500' : 'text-gray-500'">

          <span class="text-2xl">
            {{ likedBlog ? '❤️' : '🤍' }}
          </span>

                    <span class="font-bold">
            {{ blog.likes || 0 }} likes
          </span>
                </button>
            </div>

            <!-- ================= COMMENTS SECTION ================= -->

            <div class="mt-16 border-t border-gray-100 pt-10">

                <h3 class="text-2xl font-bold text-primary mb-8">
                    Comments ({{ comments?.length || 0 }})
                </h3>

                <!-- COMMENT LIST -->
                <div *ngIf="comments?.length; else noComments" class="space-y-6">

                    <div *ngFor="let comment of comments"
                         class="bg-gray-50 p-6 rounded-2xl border border-gray-100">

                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="font-semibold text-gray-800">
                                   {{ comment.userId }}
                                </p>
                                <p class="text-xs text-gray-400">
                                    {{ comment.createdAt | date:'dd MMM yyyy HH:mm' }}
                                </p>
                            </div>

                            <!-- Actions Dropdown -->
                            <div class="relative">
                                <button (click)="toggleDropdown(comment.commentId)" class="p-2 hover:bg-gray-100 rounded-full transition">
                                    <span class="text-gray-500">⋮</span>
                                </button>

                                <div *ngIf="openDropdownId === comment.commentId"
                                     class="absolute right-0 mt-2 w-32 bg-white rounded-xl shadow-lg border border-gray-100 z-20 py-1">
                                    <ng-container *ngIf="comment.userId === currentUserEmail; else reportBtn">
                                        <button (click)="startEdit(comment); toggleDropdown(comment.commentId)"
                                                class="w-full text-left px-4 py-2 text-sm text-blue-500 hover:bg-gray-50">
                                            Edit
                                        </button>
                                        <button (click)="deleteComment(comment.commentId); toggleDropdown(comment.commentId)"
                                                class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-50">
                                            Delete
                                        </button>
                                    </ng-container>
                                    <ng-template #reportBtn>
                                        <button (click)="reportComment(comment); toggleDropdown(comment.commentId)"
                                                class="w-full text-left px-4 py-2 text-sm text-orange-500 hover:bg-gray-50">
                                            Report
                                        </button>
                                    </ng-template>
                                </div>
                            </div>
                        </div>

                        <!-- Comment Content or Edit Form -->
                        <div *ngIf="editingCommentId === comment.commentId; else showContent" class="mb-4">
                            <textarea
                                    [(ngModel)]="editingContent"
                                    rows="2"
                                    class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:border-primary outline-none">
                            </textarea>
                            <div class="flex justify-end space-x-2 mt-2">
                                <button (click)="cancelEdit()" class="px-3 py-1 text-xs bg-gray-200 rounded-full">Cancel</button>
                                <button (click)="saveEdit(comment)" class="px-3 py-1 text-xs bg-primary text-white rounded-full">Save</button>
                            </div>
                        </div>

                        <ng-template #showContent>
                            <p class="text-gray-700 mb-4">
                                {{ comment.content }}
                            </p>
                        </ng-template>

                        <!-- LIKE COMMENT SECTION -->
                        <div class="flex items-center space-x-3">
                            <button
                                    (click)="toggleCommentLike(comment)"
                                    class="flex items-center space-x-2 transition"
                                    [ngClass]="likedComments[comment.commentId] ? 'text-red-600' : 'text-gray-500'">

      <span class="text-lg">
        {{ likedComments[comment.commentId] ? '❤️' : '🤍' }}
      </span>

                                <span class="text-sm font-semibold">
        {{ comment.likes || 0 }}
      </span>
                            </button>
                        </div>

                    </div>

                </div>

                <ng-template #noComments>
                    <p class="text-gray-400 text-center py-6">
                        No comments yet.
                    </p>
                </ng-template>

                <!-- ADD COMMENT -->
                <div *ngIf="authService.isLoggedIn()" class="mt-10 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <h4 class="font-semibold text-primary mb-4">Add Comment</h4>

                    <textarea
                            [(ngModel)]="newComment.content"
                            rows="3"
                            placeholder="Write your comment..."
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
          </textarea>

                    <div class="flex justify-end mt-4">
                        <button
                                (click)="addComment()"
                                [disabled]="!newComment.content.trim()"
                                class="bg-primary text-white px-6 py-2 rounded-full font-semibold hover:bg-primary/90 transition disabled:opacity-50">
                            Post Comment
                        </button>
                    </div>
                </div>

            </div>

            <!-- ================================================ -->

        </div>

        <!-- BACK BUTTON -->
        <div class="mt-12">
            <a routerLink="/blog"
               class="inline-flex items-center space-x-2 text-primary font-bold">
                <span>⬅️</span>
                <span>Back to Blog</span>
            </a>
        </div>

    </div>
</div>
