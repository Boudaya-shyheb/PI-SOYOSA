apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-microservice-deployment
  namespace: pi-soyosa
  labels:
    app: blog-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-microservice
  template:
    metadata:
      labels:
        app: blog-microservice
    spec:
      containers:
      - name: blog-microservice
        image: oussema22/pi-blog-microservice:latest
        ports:
        - containerPort: 8072
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/blog_db?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
