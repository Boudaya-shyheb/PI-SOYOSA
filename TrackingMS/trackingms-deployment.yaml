apiVersion: apps/v1
kind: Deployment
metadata:
  name: trackingms-deployment
  namespace: pi-soyosa
  labels:
    app: trackingms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trackingms
  template:
    metadata:
      labels:
        app: trackingms
    spec:
      containers:
      - name: trackingms
        image: oussema22/pi-trackingms:latest
        ports:
        - containerPort: 8087
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: USER_SERVICE_URL
          value: "http://user-microservice:8070/api"
        - name: ECOMMERCE_SERVICE_URL
          value: "http://ecommerce-microservice:8085"
