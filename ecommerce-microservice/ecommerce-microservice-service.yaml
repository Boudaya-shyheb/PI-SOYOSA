apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: '8085'
    prometheus.io/scrape: 'true'
  name: ecommerce-service
  namespace: pi-soyosa
spec:
  ports:
  - port: 8085
    protocol: TCP
    targetPort: 8085
  selector:
    app: ecommerce-microservice
  type: ClusterIP
