apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-microservice-deployment
  namespace: pi-soyosa
  labels:
    app: ecommerce-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-microservice
  template:
    metadata:
      labels:
        app: ecommerce-microservice
    spec:
      containers:
      - name: ecommerce-microservice
        image: oussema22/pi-ecommerce-microservice:latest
        ports:
        - containerPort: 8085
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/ecommercedb?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
        - name: USER_SERVICE_URL
          value: "http://user-microservice:8070/api"
