    prometheus.io/port: '8071'
    prometheus.io/scrape: 'true'
  name: interview-service
  namespace: pi-soyosa
spec:
  ports:
  - port: 8071
    protocol: TCP
    targetPort: 8071
  selector:
    app: interview-microservice
  type: ClusterIP
