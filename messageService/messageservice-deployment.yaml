apiVersion: apps/v1
kind: Deployment
metadata:
  name: messageservice-deployment
  namespace: pi-soyosa
  labels:
    app: messageservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messageservice
  template:
    metadata:
      labels:
        app: messageservice
    spec:
      containers:
      - name: messageservice
        image: oussema22/pi-messageservice:latest
        ports:
        - containerPort: 8083
        env:
        - name: EUREKA_URL
          value: "http://eureka-server:8761/eureka/"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/MessageService?createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "rootpassword"
